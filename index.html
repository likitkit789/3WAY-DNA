<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>BJ Pro Strategy - Push Update</title>
    <style>
        @import url('https://googleapis.com');
        body { font-family: 'Kanit', sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: #2c3e50; padding: 20px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 95%; max-width: 500px; border: 2px solid #34495e; }
        
        .config-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: #34495e; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .config-grid div { display: flex; flex-direction: column; }
        label { font-size: 0.8rem; color: #bdc3c7; margin-bottom: 4px; }
        input { padding: 8px; border-radius: 6px; border: none; background: #ecf0f1; font-weight: bold; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .alert-win { color: #2ecc71; font-size: 1.6rem; font-weight: bold; text-align: center; animation: blink 0.7s infinite; display: none; text-shadow: 0 0 10px #27ae60; margin: 10px 0; }
        .alert-loss { color: #e74c3c; font-size: 1.6rem; font-weight: bold; text-align: center; animation: blink 0.7s infinite; display: none; text-shadow: 0 0 10px #c0392b; margin: 10px 0; }

        .play-area { background: #1a1a1a; padding: 20px; border-radius: 15px; margin-bottom: 15px; text-align: center; border: 1px solid #7f8c8d; }
        .advice-box { font-size: 1.8rem; font-weight: bold; margin: 10px 0; color: #f1c40f; min-height: 45px; }
        .card-display { color: #bdc3c7; margin-bottom: 5px; }
        .card-display span { color: white; font-size: 1.2rem; }

        .btn-num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
        button { border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-num { padding: 12px 0; background: #ecf0f1; color: #2c3e50; font-size: 1.1rem; }
        
        /* ปุ่มผลลัพธ์ */
        .result-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .btn-win { background: #27ae60; color: white; padding: 15px; flex: 2; font-size: 1.1rem; }
        .btn-loss { background: #c0392b; color: white; padding: 15px; flex: 2; font-size: 1.1rem; }
        .btn-push { background: #f39c12; color: white; padding: 15px; flex: 1.5; font-size: 1.1rem; }

        .btn-reset { background: #95a5a6; color: white; padding: 10px; width: 100%; margin-top: 10px; }
        .bet-info { text-align: center; font-size: 1.1rem; margin-bottom: 15px; color: #f1c40f; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; margin: 0 0 15px 0;">Blackjack Manager</h2>

    <div class="config-grid">
        <div>
            <label>ทุนเริ่มต้น:</label>
            <input type="number" id="capital" value="1000" oninput="updateStats()">
        </div>
        <div>
            <label>ชิปเริ่มต้น (Bet):</label>
            <input type="number" id="baseBet" value="50" oninput="updateStats()">
        </div>
        <div>
            <label>เป้ากำไร (%):</label>
            <input type="number" id="targetPer" value="20" oninput="updateStats()">
        </div>
        <div>
            <label>เป้าเสีย/พัก (%):</label>
            <input type="number" id="stopLossPer" value="30" oninput="updateStats()">
        </div>
    </div>

    <div id="winMsg" class="alert-win">💰 ครบเป้ากำไรแล้ว! 💰</div>
    <div id="lossMsg" class="alert-loss">⚠️ ถึงจุดพัก/เสียเป้า! ⚠️</div>

    <div style="display:flex; justify-content: space-between; margin-bottom: 15px; padding: 0 10px;">
        <span>กำไร/ขาดทุน: <b id="displayProfit">0</b></span>
        <span>คงเหลือ: <b id="displayBalance">1,000</b></span>
    </div>

    <div class="bet-info">
        ไม้นี้วางเดิมพัน: <span id="currentBet">50</span> บาท
    </div>

    <div class="play-area">
        <div class="card-display">ดีลเลอร์: <span id="dCard">-</span></div>
        <div class="card-display">มือคุณ: <span id="pCards">-</span></div>
        <div class="advice-box" id="advice">รอไพ่ดีลเลอร์...</div>
    </div>

    <!-- ปุ่ม Win / Loss / Push -->
    <div class="result-group">
        <button class="btn-win" onclick="handleResult('win')">ชนะ</button>
        <button class="btn-loss" onclick="handleResult('loss')">แพ้</button>
        <button class="btn-push" onclick="handleResult('push')">เสมอ</button>
    </div>

    <div class="btn-num-grid">
        <button class="btn-num" onclick="pressCard(1)">A</button>
        <button class="btn-num" onclick="pressCard(2)">2</button>
        <button class="btn-num" onclick="pressCard(3)">3</button>
        <button class="btn-num" onclick="pressCard(4)">4</button>
        <button class="btn-num" onclick="pressCard(5)">5</button>
        <button class="btn-num" onclick="pressCard(6)">6</button>
        <button class="btn-num" onclick="pressCard(7)">7</button>
        <button class="btn-num" onclick="pressCard(8)">8</button>
        <button class="btn-num" onclick="pressCard(9)">9</button>
        <button class="btn-num" onclick="pressCard(10)">10</button>
    </div>

    <button class="btn-reset" onclick="resetSystem()">ล้างสถิติทั้งหมด</button>
</div>

<script>
    let cards = [];
    let sessionProfit = 0;

    function updateStats() {
        const cap = parseFloat(document.getElementById('capital').value) || 0;
        const bBet = parseFloat(document.getElementById('baseBet').value) || 0;
        const tPer = parseFloat(document.getElementById('targetPer').value) || 0;
        const sPer = parseFloat(document.getElementById('stopLossPer').value) || 0;

        const targetVal = (cap * tPer) / 100;
        const lossVal = -(cap * sPer) / 100;

        document.getElementById('displayProfit').innerText = sessionProfit.toLocaleString();
        document.getElementById('displayProfit').style.color = sessionProfit >= 0 ? (sessionProfit === 0 ? "white" : "#2ecc71") : "#e74c3c";
        document.getElementById('displayBalance').innerText = (cap + sessionProfit).toLocaleString();
        document.getElementById('currentBet').innerText = bBet.toLocaleString();

        document.getElementById('winMsg').style.display = (sessionProfit >= targetVal && targetVal > 0) ? "block" : "none";
        document.getElementById('lossMsg').style.display = (sessionProfit <= lossVal && lossVal !== 0) ? "block" : "none";
    }

    function handleResult(res) {
        const bet = parseFloat(document.getElementById('baseBet').value) || 0;
        if (res === 'win') {
            sessionProfit += bet;
        } else if (res === 'loss') {
            sessionProfit -= bet;
        }
        // กรณี 'push' จะไม่บวกหรือลบเงิน เพียงแค่เคลียร์ไพ่
        
        clearCards();
        updateStats();
    }

    function pressCard(n) {
        cards.push(n);
        renderGame();
    }

    function clearCards() {
        cards = [];
        renderGame();
    }

    function resetSystem() {
        if(confirm("ล้างสถิติและกำไรทั้งหมด?")) {
            sessionProfit = 0;
            clearCards();
            updateStats();
        }
    }

    function renderGame() {
        const dSpan = document.getElementById('dCard');
        const pSpan = document.getElementById('pCards');
        const adv = document.getElementById('advice');

        if (cards.length === 0) {
            dSpan.innerText = "-"; pSpan.innerText = "-";
            adv.innerText = "รอไพ่ดีลเลอร์...";
            return;
        }

        const d = cards[0];
        const pHand = cards.slice(1);
        dSpan.innerText = d === 1 ? "A" : d;
        pSpan.innerText = pHand.length > 0 ? pHand.map(x => x === 1 ? "A" : x).join(', ') : "-";

        if (cards.length < 3) {
            adv.innerText = "ลงไพ่เพเยอร์...";
            return;
        }

        adv.innerText = getBasicStrategy(d, pHand);
    }

    function getBasicStrategy(d, pHand) {
        // ใช้ค่าไพ่ (Ace ในการคำนวณแต้มรวมทั่วไปให้เป็น 1 ก่อน)
        const hardSum = pHand.reduce((a, b) => a + b, 0);
        const hasAce = pHand.includes(1);
        const isPair = pHand.length === 2 && pHand[0] === pHand[1];

        if (isPair && pHand.length === 2) {
            const val = pHand[0];
            if (val === 1 || val === 8) return "แยก (SPLIT)";
            if ((val === 2 || val === 3 || val === 7) && d <= 7) return "แยก (SPLIT)";
            if (val === 6 && d <= 6) return "แยก (SPLIT)";
            if (val === 4 && (d === 5 || d === 6)) return "แยก (SPLIT)";
            if (val === 9 && (d <= 6 || d === 8 || d === 9)) return "แยก (SPLIT)";
        }

        if (hasAce && hardSum <= 11) {
            const softSum = hardSum + 10;
            if (softSum >= 19) return "อยู่ (STAND)";
            if (softSum === 18) return d <= 6 ? "ดับเบิ้ล / อยู่" : "อยู่ (STAND)";
            if (softSum === 17) return (d >= 3 && d <= 6) ? "ดับเบิ้ล / จั่ว" : "จั่ว (HIT)";
            return "จั่ว (HIT)";
        }

        if (hardSum >= 17) return "อยู่ (STAND)";
        if (hardSum >= 13 && hardSum <= 16) return d <= 6 ? "อยู่ (STAND)" : "จั่ว (HIT)";
        if (hardSum === 12) return (d >= 4 && d <= 6) ? "อยู่ (STAND)" : "จั่ว (HIT)";
        if (hardSum === 11) return "ดับเบิ้ล (DOUBLE)";
        if (hardSum === 10) return d <= 9 ? "ดับเบิ้ล (DOUBLE)" : "จั่ว (HIT)";
        if (hardSum === 9) return (d >= 3 && d <= 6) ? "ดับเบิ้ล (DOUBLE)" : "จั่ว (HIT)";

        return "จั่ว (HIT)";
    }

    updateStats();
</script>
</body>
</html>
