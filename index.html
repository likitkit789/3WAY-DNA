<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA Smart Sync - Pro Scroll</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050505; color: #e0e0e0; padding: 10px; margin: 0; }
        .container { max-width: 420px; margin: auto; background: #151515; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        
        .calc-box { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; background: #222; padding: 10px; border-radius: 10px; border: 1px solid #444; }
        input { width: 85%; padding: 6px; border-radius: 5px; border: none; background: #000; color: #00ff88; text-align: center; font-weight: bold; font-size: 1.1em; }
        .money-row { grid-column: span 2; display: flex; justify-content: space-between; font-size: 0.85em; padding-top: 5px; border-top: 1px solid #333; }

        .history-row { background: #000; padding: 12px; border-radius: 6px; margin-bottom: 12px; font-family: monospace; font-size: 1.3em; color: #fff; overflow-x: auto; white-space: nowrap; border: 1px solid #444; letter-spacing: 3px; display: flex; flex-direction: row-reverse; }

        .main-btns { display: grid; grid-template-columns: 2fr 2fr 1fr 1fr; gap: 6px; margin-bottom: 8px; }
        .reset-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-bottom: 15px; }
        
        button { border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; }
        .btn-p { background: #0062ff; height: 55px; font-size: 1.6em; box-shadow: 0 4px #0046b3; }
        .btn-b { background: #e62e2e; height: 55px; font-size: 1.6em; box-shadow: 0 4px #b31a1a; }
        .btn-action { background: #444; font-size: 0.8em; padding: 5px; }
        .btn-reset { background: #6c757d; font-size: 0.75em; padding: 8px 0; }
        .btn-reset-all { background: #85144b; font-size: 0.75em; }

        .dna-card { background: #1e1e1e; margin-bottom: 8px; padding: 10px; border-radius: 10px; border: 2px solid transparent; }
        .dna-card.best-active { background: #1b3d2f; border: 2px solid #00ff88; box-shadow: 0 0 15px rgba(0,255,136,0.2); }
        .dna-next { font-size: 2.2em; font-weight: bold; }

        /* ระบบเลื่อนสัญลักษณ์ */
        .auto-check { display: flex; overflow-x: auto; gap: 4px; font-size: 1.1em; margin-top: 6px; border-top: 1px solid #333; padding: 8px 0; direction: rtl; }
        .auto-check::-webkit-scrollbar { height: 4px; }
        .auto-check::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }

        @keyframes blink { 0%, 100% {opacity: 1;} 50% {opacity: 0.3;} }
        .blink-win { color: #00ff88; animation: blink 1s infinite; font-weight: bold; text-align: center; font-size: 1.1em; }
        .blink-loss { color: #ff4444; animation: blink 0.6s infinite; font-weight: bold; text-align: center; font-size: 1.1em; }

        .bet-label { text-align: center; background: #000; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 2px solid #ffcc00; }
        #msg { text-align: center; color: #ffcc00; margin: 15px 0; }
    </style>
</head>
<body>

<div class="container">
    <div class="calc-box">
        <div>ทุน<br><input type="number" id="cap" value="1000" oninput="calc()"></div>
        <div>ชิพเริ่มต้น<br><input type="number" id="chip" value="50" oninput="calc()"></div>
        <div>เป้ากำไร %<br><input type="number" id="p_target" value="10" oninput="calc()"></div>
        <div>ขาดทุน %<br><input type="number" id="l_target" value="20" oninput="calc()"></div>
        <div class="money-row">
            <span>กำไร: <b id="cur_profit" style="color:#00ff88">0</b></span>
            <span>รวมทุน: <b id="cur_total">1000</b></span>
        </div>
    </div>

    <div class="bet-label">
        <small style="color:#aaa;">ตาถัดไปวาง</small><br>
        <span style="font-size: 1.5em; color: #ffcc00; font-weight: bold;" id="next_bet">50</span>
    </div>

    <div class="history-row" id="view-hist"></div>

    <div class="main-btns">
        <button class="btn-p" onclick="add('P')">P</button>
        <button class="btn-b" onclick="add('B')">B</button>
        <button class="btn-action" onclick="undo()">Undo</button>
        <button class="btn-action" onclick="resetAll()">Reset All</button>
    </div>

    <div class="reset-btns">
        <button class="btn-reset" onclick="resetData()">ล้างสถิติ</button>
        <button class="btn-reset" onclick="resetMoney()">ล้างการเงิน</button>
        <button class="btn-reset-all" onclick="resetAll()">ล้างทั้งหมด</button>
    </div>

    <div id="status-msg"></div>
    <div id="msg">กรุณากรอกสถิติให้ครบ 10 ตา</div>
    <div id="dna-list"></div>
</div>

<script>
    let history = [];
    let activeDnaIds = [null, null, null];
    let bestId = null;
    let currentProfit = 0;
    let isLastWin = false;

    function getPredict(h, id) {
        if (!h.length) return 'P';
        let seeds = [h[h.length-1], h[h.length-1] === 'P' ? 'B' : 'P', h[h.length-2] || 'P', (id % 2 === 0) ? 'P' : 'B'];
        return seeds[id % 4];
    }

    function calc() {
        let cap = parseFloat(document.getElementById('cap').value) || 0;
        let chip = parseFloat(document.getElementById('chip').value) || 0;
        let pGoal = (cap * parseFloat(document.getElementById('p_target').value)) / 100;
        let lGoal = -(cap * parseFloat(document.getElementById('l_target').value)) / 100;

        document.getElementById('cur_profit').innerText = currentProfit.toLocaleString();
        document.getElementById('cur_total').innerText = (cap + currentProfit).toLocaleString();
        document.getElementById('next_bet').innerText = (isLastWin ? chip * 2 : chip).toLocaleString();

        let s = document.getElementById('status-msg');
        s.innerHTML = '';
        if (currentProfit >= pGoal && pGoal > 0) {
            s.innerHTML = `<div class="blink-win">เป้ากำไรสำเร็จ! +${currentProfit}<br>พอเถอะครับ พรุ่งนี้ค่อยมาใหม่</div>`;
        } else if (currentProfit <= lGoal && lGoal < 0) {
            s.innerHTML = `<div class="blink-loss">ขาดทุนเกินลิมิต! ${currentProfit}<br>หยุดเดี๋ยวนี้! อย่าตามทุนคืนตอนนี้</div>`;
        }
    }

    function add(val) {
        if (history.length >= 10 && bestId !== null) {
            let pred = getPredict(history, bestId);
            let bet = parseFloat(document.getElementById('next_bet').innerText);
            if (pred === val) { currentProfit += bet; isLastWin = true; }
            else { currentProfit -= bet; isLastWin = false; }
        }
        history.push(val);
        update();
    }

    function undo() { history.pop(); update(); }
    
    // ฟังก์ชัน Reset แบบแยกส่วน
    function resetData() { history = []; activeDnaIds = [null, null, null]; bestId = null; update(); }
    function resetMoney() { currentProfit = 0; isLastWin = false; calc(); }
    function resetAll() { resetData(); resetMoney(); }

    function update() {
        document.getElementById('view-hist').innerText = [...history].reverse().join(' ');
        if (history.length >= 10) {
            document.getElementById('msg').style.display = 'none';
            refreshDNA();
        } else {
            document.getElementById('msg').style.display = 'block';
            document.getElementById('msg').innerText = `รอสถิติอีก ${10 - history.length} ตา...`;
            document.getElementById('dna-list').innerHTML = '';
        }
        calc();
    }

    function refreshDNA() {
        for (let i = 0; i < 3; i++) {
            if (activeDnaIds[i] !== null && getLoss(activeDnaIds[i]) > 2) activeDnaIds[i] = null;
        }
        for (let i = 0; i < 3; i++) {
            if (activeDnaIds[i] === null) {
                for (let id = 1; id <= 256; id++) {
                    if (activeDnaIds.includes(id)) continue;
                    if (getLoss(id) <= 2) { activeDnaIds[i] = id; break; }
                }
            }
        }
        let bestScore = 99;
        activeDnaIds.forEach(id => {
            if (id === null) return;
            let currentLoss = getLoss(id);
            if (currentLoss < bestScore) { bestScore = currentLoss; bestId = id; }
        });
        render();
    }

    function getLoss(id) {
        let max = 0, cur = 0;
        for (let j = 1; j < history.length; j++) {
            let p = getPredict(history.slice(0, j), id);
            if (p !== history[j]) { cur++; if(cur > max) max = cur; }
            else cur = 0;
        }
        return max;
    }

    function render() {
        let html = '';
        activeDnaIds.forEach(id => {
            if (id === null) return;
            let icons = [];
            for (let j = 1; j < history.length; j++) {
                icons.push(getPredict(history.slice(0, j), id) === history[j] ? "✅" : "❌");
            }
            let next = getPredict(history, id);
            let isBest = (id === bestId);
            
            html += `<div class="dna-card ${isBest ? 'best-active' : ''}">
                <div class="dna-header">
                    <span style="font-size:0.7em; color:#888;">DNA SET #${id} ${isBest ? '★ แนะนำ' : ''}</span>
                    <span class="dna-next" style="color:${next==='P'?'#0062ff':'#e62e2e'}">${next}</span>
                </div>
                <div class="auto-check">${icons.reverse().map(i => `<span>${i}</span>`).join('')}</div>
            </div>`;
        });
        document.getElementById('dna-list').innerHTML = html;
    }
    calc();
</script>
</body>
</html>
