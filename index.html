<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA Grand Master - Sync Undo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #050505; color: #e0e0e0; padding: 10px; margin: 0; }
        .container { max-width: 420px; margin: auto; background: #151515; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        
        .calc-box { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; background: #222; padding: 10px; border-radius: 10px; border: 1px solid #444; }
        input { width: 85%; padding: 6px; border-radius: 5px; border: none; background: #000; color: #00ff88; text-align: center; font-weight: bold; font-size: 1.1em; }
        .money-row { grid-column: span 2; display: flex; justify-content: space-between; font-size: 0.85em; padding-top: 5px; border-top: 1px solid #333; }

        .bet-label { text-align: center; background: #000; padding: 12px; border-radius: 10px; margin-bottom: 10px; border: 2px solid #ffcc00; }
        .bet-val { font-size: 1.7em; color: #ffcc00; font-weight: bold; }

        .history-row { background: #000; padding: 12px; border-radius: 6px; margin-bottom: 12px; font-family: monospace; font-size: 1.3em; color: #fff; overflow-x: auto; white-space: nowrap; border: 1px solid #444; letter-spacing: 3px; display: flex; flex-direction: row-reverse; min-height: 24px;}

        .main-btns { display: grid; grid-template-columns: 1.5fr 1.5fr 1fr 1.2fr 1.2fr; gap: 6px; margin-bottom: 10px; }
        .reset-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 15px; }
        button { border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; }
        .btn-p { background: #0062ff; height: 60px; font-size: 1.6em; box-shadow: 0 4px #0046b3; }
        .btn-b { background: #e62e2e; height: 60px; font-size: 1.6em; box-shadow: 0 4px #b31a1a; }
        .btn-t { background: #28a745; height: 60px; font-size: 1.6em; box-shadow: 0 4px #1e7e34; }
        .btn-action { background: #444; font-size: 0.8em; }
        .btn-reset { background: #555; font-size: 0.7em; padding: 10px 0; }

        .dna-card { background: #1e1e1e; margin-bottom: 6px; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        .dna-card.recommended { background: #1b3d2f; border: 2px solid #00ff88; box-shadow: 0 0 10px rgba(0,255,136,0.3); }
        .dna-header { display: flex; justify-content: space-between; align-items: center; }
        .dna-next { font-size: 1.8em; font-weight: bold; }
        .auto-check { display: flex; overflow-x: auto; gap: 3px; font-size: 1.1em; border-top: 1px solid #333; padding-top: 5px; direction: rtl; }

        @keyframes blink { 0%, 100% {opacity: 1;} 50% {opacity: 0.2;} }
        .alert-box { margin-top: 10px; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; animation: blink 1s infinite; }
        .win-target { border: 2px solid #00ff88; color: #00ff88; background: rgba(0,255,136,0.1); }
        .loss-target { border: 2px solid #ff4444; color: #ff4444; background: rgba(255,68,68,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="calc-box">
        <div>ทุน<br><input type="number" id="cap" value="1000" oninput="calc()"></div>
        <div>ชิพหลัก<br><input type="number" id="chip" value="50" oninput="calc()"></div>
        <div>กำไร %<br><input type="number" id="p_target" value="10" oninput="calc()"></div>
        <div>ขาดทุน %<br><input type="number" id="l_target" value="20" oninput="calc()"></div>
        <div class="money-row">
            <span>กำไรสุทธิ: <b id="cur_profit" style="color:#00ff88">0</b></span>
            <span>เงินรวม: <b id="cur_total">1000</b></span>
        </div>
    </div>

    <div class="bet-label">
        <span class="bet-val" id="next_bet">50</span> <span style="color:#00ff88; font-weight:bold;">+ เสมอ 50</span><br>
        <small style="color:#aaa;">วางตามสีเขียว ★ | ยอดรวม: <span id="total_bet">100</span></small>
    </div>

    <div class="history-row" id="view-hist"></div>

    <div class="main-btns">
        <button class="btn-p" onclick="add('P')">P</button>
        <button class="btn-b" onclick="add('B')">B</button>
        <button class="btn-t" onclick="add('T')">T</button>
        <button class="btn-action" onclick="undo()">Undo</button>
        <button class="btn-action" style="background:#85144b" onclick="resetAll()">Clear</button>
    </div>

    <div class="reset-btns">
        <button class="btn-reset" onclick="resetData()">ล้างสถิติ</button>
        <button class="btn-reset" onclick="resetMoney()">ล้างเดินเงิน</button>
        <button class="btn-reset" onclick="resetAll()">ล้างทั้งหมด</button>
    </div>

    <div id="status-msg"></div>
    <div id="dna-list"></div>
</div>

<script>
    let rawHistory = [];
    let dnaHistory = [];
    let profitHistory = [0]; // เก็บกำไรย้อนหลังเพื่อ Undo
    let winStatusHistory = [false]; // เก็บสถานะชนะย้อนหลังเพื่อ Undo
    
    let currentProfit = 0;
    let isLastWin = false;
    let activeDnaIds = [1, 2, 3, 4, 5];
    let recommendedId = 1;
    const TIE_BET = 50;

    function getPredict(h, id) {
        if (h.length < 1) return 'P';
        const last = h[h.length-1];
        const seeds = [last, last === 'P' ? 'B' : 'P', h[h.length-2] || 'B', h[h.length-3] || 'P', (h.length % 2 === 0 ? 'P' : 'B')];
        return seeds[id % 5];
    }

    function calc() {
        let cap = parseFloat(document.getElementById('cap').value) || 0;
        let chip = parseFloat(document.getElementById('chip').value) || 0;
        let mainBet = isLastWin ? chip * 2 : chip;
        let pGoal = (cap * parseFloat(document.getElementById('p_target').value)) / 100;
        let lGoal = -(cap * parseFloat(document.getElementById('l_target').value)) / 100;

        document.getElementById('cur_profit').innerText = Math.floor(currentProfit).toLocaleString();
        document.getElementById('cur_total').innerText = Math.floor(cap + currentProfit).toLocaleString();
        document.getElementById('next_bet').innerText = mainBet.toLocaleString();
        document.getElementById('total_bet').innerText = (mainBet + TIE_BET).toLocaleString();

        const s = document.getElementById('status-msg');
        s.innerHTML = '';
        if (currentProfit >= pGoal && pGoal > 0) {
            s.innerHTML = `<div class="alert-box win-target">บวก +${Math.floor(currentProfit)} ถึงเป้า!<br>ยินดีด้วยครับ พักผ่อนและถอนเงินได้เลย</div>`;
        } else if (currentProfit <= lGoal && lGoal < 0) {
            s.innerHTML = `<div class="alert-box loss-target">ลบ ${Math.floor(currentProfit)}!<br>วินัยไม่มี ชีวิตจะพัง หยุดเดี๋ยวนี้!</div>`;
        }
    }

    function add(val) {
        let chip = parseFloat(document.getElementById('chip').value) || 0;
        let mainBet = isLastWin ? chip * 2 : chip;

        if (dnaHistory.length >= 10) {
            if (val === 'T') {
                currentProfit += (TIE_BET * 8); 
                // isLastWin ยังคงเดิม
            } else {
                let pred = getPredict(dnaHistory, recommendedId);
                if (pred === val) {
                    currentProfit += (mainBet - TIE_BET);
                    isLastWin = true;
                } else {
                    currentProfit -= (mainBet + TIE_BET);
                    isLastWin = false;
                }
            }
        }
        
        rawHistory.push(val);
        if (val !== 'T') dnaHistory.push(val);
        
        // บันทึกสถานะลง Stack เพื่อ Undo
        profitHistory.push(currentProfit);
        winStatusHistory.push(isLastWin);
        
        update();
    }

    function undo() {
        if (rawHistory.length === 0) return;
        
        let last = rawHistory.pop();
        if (last !== 'T') dnaHistory.pop();
        
        // คืนค่าการเงินจาก Stack
        profitHistory.pop();
        winStatusHistory.pop();
        currentProfit = profitHistory[profitHistory.length - 1];
        isLastWin = winStatusHistory[winStatusHistory.length - 1];
        
        update();
    }

    function resetData() { rawHistory = []; dnaHistory = []; update(); }
    function resetMoney() { currentProfit = 0; isLastWin = false; profitHistory = [0]; winStatusHistory = [false]; calc(); }
    function resetAll() { resetData(); resetMoney(); }

    function update() {
        document.getElementById('view-hist').innerText = [...rawHistory].reverse().join(' ');
        if (dnaHistory.length >= 10) {
            refreshDna();
        } else {
            document.getElementById('dna-list').innerHTML = `<div style="text-align:center; padding:20px; color:#ffcc00; font-weight:bold;">รอสถิติอีก ${10 - dnaHistory.length} ตา...</div>`;
        }
        calc();
    }

    function refreshDna() {
        let dnaResults = [];
        let bestScore = -1;

        for (let i = 0; i < 5; i++) {
            let id = activeDnaIds[i];
            let icons = [];
            let wins = 0;
            let currentStreak = 0;
            let maxStreak = 0;

            for (let j = 1; j < dnaHistory.length; j++) {
                let pred = getPredict(dnaHistory.slice(0, j), id);
                if (pred === dnaHistory[j]) {
                    icons.push("✅"); wins++; currentStreak++;
                    if (currentStreak > maxStreak) maxStreak = currentStreak;
                } else {
                    icons.push("❌"); currentStreak = 0;
                }
            }
            let score = wins + (maxStreak * 2);
            if (score > bestScore) { bestScore = score; recommendedId = id; }
            dnaResults.push({id, icons: icons.reverse(), next: getPredict(dnaHistory, id)});
        }

        let html = '';
        dnaResults.forEach(res => {
            let isBest = (res.id === recommendedId);
            html += `<div class="dna-card ${isBest ? 'recommended' : ''}">
                <div class="dna-header">
                    <span style="font-size:0.75em; color:#aaa;">SET #${res.id} ${isBest ? '★ แนะนำ' : ''}</span>
                    <span class="dna-next" style="color:${res.next==='P'?'#0062ff':'#e62e2e'}">${res.next}</span>
                </div>
                <div class="auto-check">${res.icons.map(i => `<span>${i}</span>`).join('')}</div>
            </div>`;
        });
        document.getElementById('dna-list').innerHTML = html;
    }
    update();
</script>
</body>
</html>
