<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA Scrolling Monitor</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; padding: 10px; margin: 0; }
        .container { max-width: 420px; margin: auto; background: #1a1a1a; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        
        /* Input & Profit Area */
        .calc-box { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; background: #252525; padding: 10px; border-radius: 10px; font-size: 0.85em; }
        input { width: 80%; padding: 6px; border-radius: 4px; border: none; background: #000; color: #00ff88; text-align: center; font-weight: bold; font-size: 1.1em; }
        .profit-info { grid-column: span 2; text-align: center; color: #ffcc00; margin-top: 5px; }

        /* History Belt */
        .history-row { background: #000; padding: 12px; border-radius: 6px; margin-bottom: 12px; font-family: 'Courier New', monospace; font-size: 1.2em; color: #fff; overflow-x: auto; white-space: nowrap; border: 1px solid #444; letter-spacing: 3px; display: flex; flex-direction: row-reverse; justify-content: flex-end; }
        
        /* Control Buttons */
        .main-btns { display: grid; grid-template-columns: 2fr 2fr 1fr 1fr; gap: 6px; margin-bottom: 15px; }
        button { border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; transition: 0.1s; }
        .btn-p { background: #0062ff; height: 60px; font-size: 1.6em; box-shadow: 0 4px #0046b3; }
        .btn-b { background: #e62e2e; height: 60px; font-size: 1.6em; box-shadow: 0 4px #b31a1a; }
        .btn-action { background: #444; font-size: 0.8em; }
        button:active { transform: translateY(2px); box-shadow: none; }

        /* DNA Analysis Cards */
        .dna-card { background: #262626; margin-bottom: 6px; padding: 8px 12px; border-radius: 10px; border-left: 5px solid #555; }
        .dna-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .dna-name { font-size: 0.75em; color: #888; font-weight: bold; }
        .win-rate { font-size: 0.85em; color: #00ff88; }
        .dna-next { font-size: 1.6em; font-weight: bold; }

        /* Scrolling Symbols Row */
        .auto-check-container { overflow: hidden; width: 100%; border-top: 1px solid #333; padding-top: 5px; }
        .auto-check { display: flex; flex-direction: row-reverse; justify-content: flex-end; gap: 2px; font-size: 1.1em; white-space: nowrap; }

        #msg { text-align: center; color: #ff4444; font-size: 1em; margin: 20px 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="calc-box">
        <div>ทุน<br><input type="number" id="cap" value="1000" oninput="updateMoney()"></div>
        <div>กำไร %<br><input type="number" id="pct" value="5" oninput="updateMoney()"></div>
        <div class="profit-info">
            เป้ากำไร: <span id="m-profit">50</span> | รวม: <span id="m-total">1050</span>
        </div>
    </div>

    <!-- แถวสถิติล่าสุดจะอยู่ซ้ายสุดเสมอ -->
    <div class="history-row" id="view-hist"></div>

    <div class="main-btns">
        <button class="btn-p" onclick="add('P')">P</button>
        <button class="btn-b" onclick="add('B')">B</button>
        <button class="btn-action" onclick="undo()">Undo</button>
        <button class="btn-action" onclick="reset()">Reset</button>
    </div>

    <div id="msg">กรุณากรอกข้อมูลให้ครบ 10 ตา</div>
    <div id="dna-list" style="display:none;"></div>
</div>

<script>
    let history = [];
    const minStart = 10;

    const fixedLogic = [
        { name: "SET 1: FLOW", logic: (h) => h[h.length-1] },
        { name: "SET 2: SWING", logic: (h) => h[h.length-1] === 'P' ? 'B' : 'P' },
        { name: "SET 3: DOUBLE-CUT", logic: (h) => (h.length >= 2 && h[h.length-1] === h[h.length-2]) ? (h[h.length-1] === 'P' ? 'B' : 'P') : h[h.length-1] },
        { name: "SET 4: TRIPLE-B", logic: (h) => (h.slice(-3).every(x => x === 'P')) ? 'B' : (h.slice(-3).every(x => x === 'B') ? 'P' : h[h.length-1]) },
        { name: "SET 5: SMART-RAND", logic: (h) => (h.length % 3 === 0) ? 'P' : 'B' }
    ];

    function updateMoney() {
        let c = parseFloat(document.getElementById('cap').value) || 0;
        let p = parseFloat(document.getElementById('pct').value) || 0;
        let pf = (c * p) / 100;
        document.getElementById('m-profit').innerText = pf.toLocaleString();
        document.getElementById('m-total').innerText = (c + pf).toLocaleString();
    }

    function add(val) { history.push(val); updateUI(); }
    function undo() { history.pop(); updateUI(); }
    function reset() { history = []; updateUI(); }

    function updateUI() {
        // อัปเดตแถวประวัติแบบเลื่อน (ตัวล่าสุดอยู่ซ้าย)
        const histEl = document.getElementById('view-hist');
        histEl.innerText = [...history].reverse().join(' ');

        if (history.length >= minStart) {
            document.getElementById('msg').style.display = 'none';
            document.getElementById('dna-list').style.display = 'block';
            renderDNA();
        } else {
            document.getElementById('msg').style.display = 'block';
            document.getElementById('msg').innerText = `รอข้อมูลอีก ${minStart - history.length} ตา...`;
            document.getElementById('dna-list').style.display = 'none';
        }
    }

    function renderDNA() {
        let html = '';
        fixedLogic.forEach((dna, i) => {
            let checkIcons = [];
            let wins = 0;
            let trials = 0;

            // คำนวณประวัติ ✅/❌
            for (let j = 1; j < history.length; j++) {
                let predicted = dna.logic(history.slice(0, j));
                let isWin = (predicted === history[j]);
                if (j >= 1) { // บันทึกสถิติตั้งแต่เริ่ม
                    checkIcons.push(isWin ? "✅" : "❌");
                    if (isWin) wins++;
                    trials++;
                }
            }

            let next = dna.logic(history);
            let rate = trials > 0 ? Math.round((wins / trials) * 100) : 0;
            let nextColor = (next === 'P') ? '#0062ff' : '#e62e2e';
            
            // กลับด้าน Array เพื่อให้ตัวล่าสุดอยู่ซ้ายสุด (Scrolling effect)
            let scrollingIcons = checkIcons.reverse().join('');

            html += `
                <div class="dna-card">
                    <div class="dna-header">
                        <div>
                            <span class="dna-name">${dna.name}</span><br>
                            <span class="win-rate">Win: ${rate}%</span>
                        </div>
                        <span class="dna-next" style="color: ${nextColor}">${next}</span>
                    </div>
                    <div class="auto-check-container">
                        <div class="auto-check">${scrollingIcons}</div>
                    </div>
                </div>`;
        });
        document.getElementById('dna-list').innerHTML = html;
    }

    updateMoney();
</script>

</body>
</html>
