<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA DNA Fixed-Profit Monitor</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 10px; margin: 0; }
        .container { max-width: 420px; margin: auto; background: #1a1a1a; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        
        /* Profit Calculation Area */
        .calc-box { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; background: #252525; padding: 12px; border-radius: 10px; border: 1px solid #444; }
        input { width: 85%; padding: 8px; border-radius: 5px; border: none; background: #000; color: #00ff88; text-align: center; font-weight: bold; font-size: 1.1em; }
        .profit-display { grid-column: span 2; text-align: center; margin-top: 8px; padding-top: 8px; border-top: 1px solid #3d3d3d; }
        .p-val { color: #ffcc00; font-weight: bold; font-size: 1.1em; }

        /* History Belt */
        .history-row { background: #000; padding: 12px; border-radius: 6px; margin-bottom: 12px; font-family: monospace; font-size: 1.3em; color: #fff; overflow-x: auto; white-space: nowrap; border: 1px solid #444; letter-spacing: 4px; display: flex; flex-direction: row-reverse; }
        
        /* Control Buttons */
        .main-btns { display: grid; grid-template-columns: 2fr 2fr 1fr 1fr; gap: 6px; margin-bottom: 15px; }
        button { border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; }
        .btn-p { background: #0062ff; height: 60px; font-size: 1.7em; box-shadow: 0 4px #0046b3; }
        .btn-b { background: #e62e2e; height: 60px; font-size: 1.7em; box-shadow: 0 4px #b31a1a; }
        .btn-action { background: #444; font-size: 0.85em; }
        button:active { transform: translateY(2px); box-shadow: none; }

        /* DNA Analysis Cards */
        .dna-card { background: #222; margin-bottom: 8px; padding: 12px; border-radius: 12px; border-left: 5px solid #444; transition: 0.3s; }
        .dna-header { display: flex; justify-content: space-between; align-items: center; }
        .dna-name { font-size: 0.75em; color: #999; font-weight: bold; }
        .dna-next { font-size: 2em; font-weight: bold; }

        /* Highlighting Best Set */
        .dna-card.best-row { background: #1b3d2f; border: 2px solid #00ff88; border-left: 10px solid #00ff88; }
        .dna-card.best-row .dna-name { color: #00ff88; }

        .auto-check { display: flex; flex-direction: row-reverse; gap: 2px; font-size: 1.1em; margin-top: 6px; border-top: 1px solid #333; padding-top: 6px; overflow: hidden; }
        #msg { text-align: center; color: #ff4444; margin: 20px 0; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="calc-box">
        <div>ทุน<br><input type="number" id="cap" value="1000" oninput="calc()"></div>
        <div>กำไร %<br><input type="number" id="pct" value="5" oninput="calc()"></div>
        <div class="profit-display">
            กำไรที่ต้องการ: <span class="p-val" id="p-gain">50</span> | ยอดรวมถอน: <span class="p-val" id="p-total">1050</span>
        </div>
    </div>

    <div class="history-row" id="view-hist"></div>

    <div class="main-btns">
        <button class="btn-p" onclick="add('P')">P</button>
        <button class="btn-b" onclick="add('B')">B</button>
        <button class="btn-action" onclick="undo()">Undo</button>
        <button class="btn-action" onclick="reset()">Reset</button>
    </div>

    <div id="msg">กรุณากรอกสถิติให้ครบ 10 ตา</div>
    <div id="dna-list" style="display:none;"></div>
</div>

<script>
    let history = [];
    const minStart = 10;

    const fixedLogic = [
        { id: 1, name: "SET 1: ตามล่าสุด", fn: h => h[h.length-1] },
        { id: 2, name: "SET 2: สลับปิงปอง", fn: h => h[h.length-1] === 'P' ? 'B' : 'P' },
        { id: 3, name: "SET 3: ตัดสองตัว", fn: h => (h.length >= 2 && h[h.length-1] === h[h.length-2]) ? (h[h.length-1] === 'P' ? 'B' : 'P') : h[h.length-1] },
        { id: 4, name: "SET 4: ตามตัวที่สอง", fn: h => h[h.length-2] || h[h.length-1] },
        { id: 5, name: "SET 5: ตัวน้อยสวนตัวมาก", fn: h => {
            let p = h.filter(x => x === 'P').length, b = h.filter(x => x === 'B').length;
            return p > b ? 'B' : 'P';
        }}
    ];

    function calc() {
        let c = parseFloat(document.getElementById('cap').value) || 0;
        let p = parseFloat(document.getElementById('pct').value) || 0;
        let gain = (c * p) / 100;
        document.getElementById('p-gain').innerText = gain.toLocaleString();
        document.getElementById('p-total').innerText = (c + gain).toLocaleString();
    }

    function add(val) { history.push(val); update(); }
    function undo() { history.pop(); update(); }
    function reset() { history = []; update(); }

    function update() {
        document.getElementById('view-hist').innerText = [...history].reverse().join(' ');
        if (history.length >= minStart) {
            document.getElementById('msg').style.display = 'none';
            document.getElementById('dna-list').style.display = 'block';
            render();
        } else {
            document.getElementById('msg').style.display = 'block';
            document.getElementById('msg').innerText = `รอข้อมูลอีก ${minStart - history.length} ตา...`;
            document.getElementById('dna-list').style.display = 'none';
        }
    }

    function render() {
        let results = fixedLogic.map(dna => {
            let icons = [], wins = 0, currentLoss = 0, maxLoss = 0;
            for (let j = 1; j < history.length; j++) {
                let pre = dna.fn(history.slice(0, j));
                let win = (pre === history[j]);
                icons.push(win ? "✅" : "❌");
                if (win) { currentLoss = 0; wins++; } 
                else { currentLoss++; if (currentLoss > maxLoss) maxLoss = currentLoss; }
            }
            return { ...dna, icons: icons.reverse(), maxLoss, rate: Math.round((wins/(history.length-1))*100) };
        });

        // ค้นหาชุดที่ผิดน้อยที่สุด (ไม่เกิน 2 ไม้) และแม่นที่สุด
        let best = results.reduce((prev, curr) => (curr.maxLoss < prev.maxLoss) ? curr : (curr.maxLoss === prev.maxLoss && curr.rate > prev.rate ? curr : prev));

        let html = '';
        results.forEach(dna => {
            let isBest = (dna.id === best.id && dna.maxLoss <= 2);
            let next = dna.fn(history);
            html += `
                <div class="dna-card ${isBest ? 'best-row' : ''}">
                    <div class="dna-header">
                        <div>
                            <span class="dna-name">${dna.name} ${isBest ? '★ แนะนำ' : ''}</span><br>
                            <span style="font-size:0.8em; color:#00ff88;">Win: ${dna.rate}% | ผิดต่อเนื่องสูงสุด: ${dna.maxLoss}</span>
                        </div>
                        <span class="dna-next" style="color: ${next === 'P' ? '#0062ff' : '#e62e2e'}">${next}</span>
                    </div>
                    <div class="auto-check">${dna.icons.slice(0, 30).join('')}</div>
                </div>`;
        });
        document.getElementById('dna-list').innerHTML = html;
    }

    calc();
</script>
</body>
</html>
